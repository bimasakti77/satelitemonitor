services:
  db:
    image: postgres:16-alpine
    container_name: superapps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-superapps_monitor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-superapps_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: superapps-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-superapps_monitor}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      NEXT_PUBLIC_APP_NAME: SuperApps Executive Monitoring System
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
    name: superapps_postgres_data
