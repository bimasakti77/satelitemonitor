[defaults]
inventory = inventory/production
remote_user = ansible
host_key_checking = False
retry_files_enabled = False
display_skipped_hosts = False
log_path = ansible-playbook.log
roles_path = roles
interpreter_python = /usr/bin/python3

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
